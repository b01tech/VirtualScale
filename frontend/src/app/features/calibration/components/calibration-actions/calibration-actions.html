<section class="calibration">
  @if (saveStatus(); as status) {
    <div class="status-message" [class.success]="status.success" [class.error]="!status.success">
      {{ status.message }}
    </div>
  }

  <div class="buttons">
    <app-button
      [label]="'Calibrar ZERO'"
      [variant]="'secondary'"
      [disabled]="isBusy() || isEqualizing()"
      (clicked)="calibrateZero()"
    ></app-button>
    <app-button
      [label]="'Calibrar SPAN'"
      [variant]="'secondary'"
      [disabled]="isBusy() || isEqualizing()"
      (clicked)="calibrateSpan()"
    ></app-button>
    <app-button
      [label]="'Salvar Calibração'"
      [variant]="'primary'"
      [disabled]="isBusy() || isEqualizing()"
      (clicked)="saveCalibration()"
    ></app-button>
  </div>

  <app-equalize-loadcells
    (activeChange)="setEqualizing($event)"
  ></app-equalize-loadcells>
</section>
