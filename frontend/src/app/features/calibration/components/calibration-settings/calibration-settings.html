<section class="settings">
  <app-button
    [label]="'Modificar Dados de Calibração'"
    [variant]="'secondary'"
    [disabled]="isBusy()"
    (clicked)="toggle()"
  ></app-button>

  @if (isOpen()) {
  <form class="form" [formGroup]="form" (ngSubmit)="save()">
    <label>
      Número de células
      <select formControlName="numberOfCells">
        @for (n of allowedCells; track n) {
        <option [value]="n">{{ n }}</option>
        }
      </select>
    </label>

    <label>
      Unidade
      <select formControlName="unit">
        <option value="kg">kg</option>
        <option value="g">g</option>
      </select>
    </label>

    <label>
      Capacidade Máxima
      <input type="number" step="0.001" formControlName="capMax" />
    </label>

    <label>
      Divisão
      <select formControlName="division">
        @for (d of allowedDivisions; track d) {
        <option [value]="d">{{ d }}</option>
        }
      </select>
    </label>

    <label>
      Casas decimais
      <select formControlName="decimalPlaces" [disabled]="decimalLocked()">
        @for (p of allowedDecimalPlaces; track p) {
        <option [value]="p">{{ p }}</option>
        }
      </select>
    </label>

    <label>
      Peso de Referência
      <input
        type="number"
        step="0.001"
        formControlName="referenceWeight"
        [max]="maxReferenceWeight()"
      />
    </label>

    <div class="actions">
      <app-button
        [label]="'Salvar'"
        [variant]="'secondary'"
        [disabled]="isBusy() || form.invalid"
        (clicked)="save()"
      ></app-button>
      <app-button
        [label]="'Cancelar'"
        [variant]="'danger'"
        [disabled]="isBusy()"
        (clicked)="toggle()"
      ></app-button>
    </div>
  </form>
  }
</section>
